name: Bug report
description: Something is not working correctly
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Before reporting, check if the issue already exists in [open issues](https://github.com/wielorzeczownik/ahe-ics/issues).

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: dropdown
    id: run_method
    attributes:
      label: How are you running the service?
      options:
        - Docker
        - Docker Compose
        - Prebuilt binary
        - From source (cargo run)
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      placeholder: "e.g. v0.5.6"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any relevant log output. Set `RUST_LOG=debug` for more detail.
      render: text
