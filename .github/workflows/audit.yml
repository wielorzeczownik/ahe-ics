name: Security Audit

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions: {}

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2.9.1

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked --features=fix

      - name: Run audit
        id: audit
        shell: bash
        run: bash scripts/security-audit.sh

      - name: Commit fixed Cargo.lock
        if: ${{ steps.audit.outputs.changed == 'true' }}
        uses: EndBug/add-and-commit@v10.0.0
        with:
          add: 'Cargo.lock'
          default_author: github_actions
          message: 'fix(deps): resolve audit advisories'
          push: true

      - name: Create issue
        if: ${{ steps.audit.outputs.unresolved == 'true' }}
        uses: JasonEtco/create-an-issue@v2.9.2
        env:
          GITHUB_TOKEN: ${{ github.token }}
          AUDIT_REPORT: ${{ steps.audit.outputs.report }}
          REPO_OWNER: ${{ github.repository_owner }}
        with:
          filename: .github/security-advisory-issue.md
          search_existing: open
