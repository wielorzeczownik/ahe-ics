name: Release

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "Dockerfile"
      - "Dockerfile.alpine"
      - "Dockerfile.shared"
      - "Dockerfile.alpine.shared"
      - "Dockerfile.release"
      - "Dockerfile.alpine.release"
      - "scripts/**"

concurrency:
  group: release-main
  cancel-in-progress: true

permissions: {}

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    outputs:
      released: ${{ steps.bump.outputs.released }}
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
      commit_changes: ${{ steps.bump.outputs.commit_changes }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - name: Install rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2.9.1

      - name: Install cargo-edit
        uses: taiki-e/install-action@v2.83.3
        with:
          tool: cargo-edit

      - name: Determine next version (git-cliff)
        id: cliff_bumped
        uses: orhun/git-cliff-action@v4.8.0
        with:
          config: cliff.toml
          args: --bumped-version
        env:
          OUTPUT: bumped-version.txt
          GITHUB_REPO: ${{ github.repository }}

      - name: Bump project version
        id: bump
        shell: bash
        env:
          CLIFF_BUMPED_VERSION: ${{ steps.cliff_bumped.outputs.content }}
        run: bash scripts/bump-version.sh

      - name: Generate release notes (git-cliff)
        if: ${{ steps.bump.outputs.released == 'true' }}
        uses: orhun/git-cliff-action@v4.8.0
        with:
          config: cliff-release.toml
          args: --unreleased --tag ${{ steps.bump.outputs.tag }}
        env:
          OUTPUT: release-notes.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Generate CHANGELOG.md (git-cliff)
        if: ${{ steps.bump.outputs.released == 'true' }}
        uses: orhun/git-cliff-action@v4.8.0
        with:
          config: cliff.toml
          args: --tag ${{ steps.bump.outputs.tag }}
        env:
          OUTPUT: CHANGELOG.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Commit, tag, and push
        if: ${{ steps.bump.outputs.released == 'true' && steps.bump.outputs.commit_changes == 'true' }}
        uses: EndBug/add-and-commit@v10.0.0
        with:
          add: "Cargo.toml Cargo.lock CHANGELOG.md"
          default_author: github_actions
          message: "chore(release): ${{ steps.bump.outputs.tag }} [skip ci]"
          tag: "${{ steps.bump.outputs.tag }}"
          push: true

      - name: Commit changelog and tag
        if: ${{ steps.bump.outputs.released == 'true' && steps.bump.outputs.commit_changes == 'false' }}
        uses: EndBug/add-and-commit@v10.0.0
        with:
          add: "CHANGELOG.md"
          default_author: github_actions
          message: "chore(release): ${{ steps.bump.outputs.tag }} [skip ci]"
          tag: "${{ steps.bump.outputs.tag }}"
          push: true

      - name: Upload release notes
        if: ${{ steps.bump.outputs.released == 'true' }}
        uses: actions/upload-artifact@v7.0.1
        with:
          name: release-notes
          path: release-notes.md

  build-artifacts:
    needs: prepare-release
    if: ${{ needs.prepare-release.outputs.released == 'true' }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          # Dedicated binary
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bin_name: ahe-ics
            binary: ahe-ics
            archive: tar.gz
          - os: ubuntu-22.04
            target: aarch64-unknown-linux-gnu
            bin_name: ahe-ics
            binary: ahe-ics
            archive: tar.gz
          - os: macos-15-intel
            target: x86_64-apple-darwin
            bin_name: ahe-ics
            binary: ahe-ics
            archive: tar.gz
          - os: macos-15
            target: aarch64-apple-darwin
            bin_name: ahe-ics
            binary: ahe-ics
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bin_name: ahe-ics
            binary: ahe-ics.exe
            archive: zip
          - os: windows-latest
            target: i686-pc-windows-msvc
            bin_name: ahe-ics
            binary: ahe-ics.exe
            archive: zip
          - os: windows-11-arm
            target: aarch64-pc-windows-msvc
            bin_name: ahe-ics
            binary: ahe-ics.exe
            archive: zip
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-musl
            bin_name: ahe-ics
            binary: ahe-ics
            archive: tar.gz
            build_cmd: cargo zigbuild
          - os: ubuntu-22.04
            target: aarch64-unknown-linux-musl
            bin_name: ahe-ics
            binary: ahe-ics
            archive: tar.gz
            build_cmd: cargo zigbuild
          - os: ubuntu-22.04
            target: armv7-unknown-linux-gnueabihf
            bin_name: ahe-ics
            binary: ahe-ics
            archive: tar.gz
            build_cmd: cargo zigbuild
          - os: ubuntu-22.04
            target: i686-unknown-linux-gnu
            bin_name: ahe-ics
            binary: ahe-ics
            archive: tar.gz
            build_cmd: cargo zigbuild
          # Shared binary
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bin_name: ahe-ics-shared
            binary: ahe-ics-shared
            archive: tar.gz
          - os: ubuntu-22.04
            target: aarch64-unknown-linux-gnu
            bin_name: ahe-ics-shared
            binary: ahe-ics-shared
            archive: tar.gz
          - os: macos-15-intel
            target: x86_64-apple-darwin
            bin_name: ahe-ics-shared
            binary: ahe-ics-shared
            archive: tar.gz
          - os: macos-15
            target: aarch64-apple-darwin
            bin_name: ahe-ics-shared
            binary: ahe-ics-shared
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bin_name: ahe-ics-shared
            binary: ahe-ics-shared.exe
            archive: zip
          - os: windows-latest
            target: i686-pc-windows-msvc
            bin_name: ahe-ics-shared
            binary: ahe-ics-shared.exe
            archive: zip
          - os: windows-11-arm
            target: aarch64-pc-windows-msvc
            bin_name: ahe-ics-shared
            binary: ahe-ics-shared.exe
            archive: zip
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-musl
            bin_name: ahe-ics-shared
            binary: ahe-ics-shared
            archive: tar.gz
            build_cmd: cargo zigbuild
          - os: ubuntu-22.04
            target: aarch64-unknown-linux-musl
            bin_name: ahe-ics-shared
            binary: ahe-ics-shared
            archive: tar.gz
            build_cmd: cargo zigbuild
          - os: ubuntu-22.04
            target: armv7-unknown-linux-gnueabihf
            bin_name: ahe-ics-shared
            binary: ahe-ics-shared
            archive: tar.gz
            build_cmd: cargo zigbuild
          - os: ubuntu-22.04
            target: i686-unknown-linux-gnu
            bin_name: ahe-ics-shared
            binary: ahe-ics-shared
            archive: tar.gz
            build_cmd: cargo zigbuild
    steps:
      - name: Checkout tag
        uses: actions/checkout@v7.0.0
        with:
          ref: ${{ needs.prepare-release.outputs.tag }}
          persist-credentials: false

      - name: Install rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2.9.1
        with:
          key: ${{ matrix.bin_name }}-${{ matrix.target }}

      - name: Install Linux ARM64 linker
        if: ${{ matrix.target == 'aarch64-unknown-linux-gnu' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install Zig
        if: ${{ matrix.build_cmd == 'cargo zigbuild' }}
        run: pip install ziglang

      - name: Install cargo-zigbuild
        if: ${{ matrix.build_cmd == 'cargo zigbuild' }}
        uses: taiki-e/install-action@v2.83.3
        with:
          tool: cargo-zigbuild

      - name: Build binary
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: ${{ matrix.build_cmd || 'cargo build' }} --release --target ${{ matrix.target }} --bin ${{ matrix.bin_name }}

      - name: Package (tar.gz)
        if: ${{ matrix.archive == 'tar.gz' }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          asset="${{ matrix.bin_name }}-${{ matrix.target }}.tar.gz"
          tar -C "target/${{ matrix.target }}/release" -czf "dist/${asset}" "${{ matrix.binary }}"

      - name: Package (zip)
        if: ${{ matrix.archive == 'zip' }}
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          $asset = "${{ matrix.bin_name }}-${{ matrix.target }}.zip"
          Compress-Archive -Path "target/${{ matrix.target }}/release/${{ matrix.binary }}" -DestinationPath "dist/$asset"

      - name: Upload artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: binaries-${{ matrix.bin_name }}-${{ matrix.target }}
          path: dist/*

  publish-release:
    needs:
      - prepare-release
      - build-artifacts
    if: ${{ needs.prepare-release.outputs.released == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Download binary artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          path: dist
          pattern: binaries-*
          merge-multiple: true

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4.1.1
        with:
          subject-path: dist/*

      - name: Compute SHA-256 checksums
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          for file in *; do
            sha256sum "$file" > "$file.sha256"
          done

      - name: Download release notes
        uses: actions/download-artifact@v8.0.1
        with:
          name: release-notes
          path: .

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3.0.2
        with:
          tag_name: ${{ needs.prepare-release.outputs.tag }}
          name: ${{ needs.prepare-release.outputs.tag }}
          body_path: release-notes.md
          files: dist/*

  publish-docker:
    needs:
      - prepare-release
      - build-artifacts
    if: ${{ needs.prepare-release.outputs.released == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: debian
            dockerfile: Dockerfile.release
            bin_name: ahe-ics
            libc: gnu
            image_name: ahe-ics
            tag_suffix: ""
            latest_tag: latest
            platforms: linux/amd64,linux/arm64,linux/arm/v7,linux/386
            title: "ahe-ics"
            description: "Self-hosted AHE Łódź class schedule exporter to iCalendar (ICS)"
          - variant: alpine
            dockerfile: Dockerfile.alpine.release
            bin_name: ahe-ics
            libc: musl
            image_name: ahe-ics
            tag_suffix: "-alpine"
            latest_tag: alpine
            platforms: linux/amd64,linux/arm64
            title: "ahe-ics"
            description: "Self-hosted AHE Łódź class schedule exporter to iCalendar (ICS)"
          - variant: shared-debian
            dockerfile: Dockerfile.release
            bin_name: ahe-ics-shared
            libc: gnu
            image_name: ahe-ics
            tag_suffix: "-shared"
            latest_tag: shared
            platforms: linux/amd64,linux/arm64,linux/arm/v7,linux/386
            title: "ahe-ics-shared"
            description: "AHE Łódź class schedule exporter — stateless SaaS variant (credentials per request)"
          - variant: shared-alpine
            dockerfile: Dockerfile.alpine.release
            bin_name: ahe-ics-shared
            libc: musl
            image_name: ahe-ics
            tag_suffix: "-shared-alpine"
            latest_tag: shared-alpine
            platforms: linux/amd64,linux/arm64
            title: "ahe-ics-shared"
            description: "AHE Łódź class schedule exporter — stateless SaaS variant (credentials per request)"
    steps:
      - name: Checkout tag
        uses: actions/checkout@v7.0.0
        with:
          ref: ${{ needs.prepare-release.outputs.tag }}
          persist-credentials: false

      - name: Download release binaries
        uses: actions/download-artifact@v8.0.1
        with:
          path: dist
          pattern: binaries-${{ matrix.bin_name }}-*
          merge-multiple: true

      - name: Stage binaries into build context
        shell: bash
        env:
          BIN_NAME: ${{ matrix.bin_name }}
          LIBC: ${{ matrix.libc }}
          PLATFORMS: ${{ matrix.platforms }}
        run: bash scripts/stage-docker-binaries.sh

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.2.0

      - name: Build amd64 image for smoke test
        uses: docker/build-push-action@v7.3.0
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          load: true
          platforms: linux/amd64
          build-args: |
            BIN=${{ matrix.bin_name }}
            IMAGE_TITLE=${{ matrix.title }}
            IMAGE_DESCRIPTION=${{ matrix.description }}
          tags: ahe-ics-smoke:${{ matrix.variant }}

      - name: Smoke test image
        shell: bash
        env:
          IMAGE: ahe-ics-smoke:${{ matrix.variant }}
        run: bash scripts/smoke-test-image.sh

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GH_RELEASE_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v4.4.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME || github.repository_owner }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6.2.0
        env:
          DOCKER_METADATA_ANNOTATIONS_LEVELS: manifest,index
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image_name }}
            docker.io/${{ secrets.DOCKERHUB_USERNAME || github.repository_owner }}/${{ matrix.image_name }}
          tags: |
            type=raw,value=${{ needs.prepare-release.outputs.version }}${{ matrix.tag_suffix }}
            type=raw,value=${{ matrix.latest_tag }}
          labels: |
            org.opencontainers.image.description=${{ matrix.description }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7.3.0
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: ${{ matrix.platforms }}
          build-args: |
            BIN=${{ matrix.bin_name }}
            IMAGE_TITLE=${{ matrix.title }}
            IMAGE_DESCRIPTION=${{ matrix.description }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          provenance: true
          sbom: true
